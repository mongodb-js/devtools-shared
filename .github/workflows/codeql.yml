name: CodeQL

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "30 14 * * 4"
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript
          - actions

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: 2a7f22484b64c6fc3fd2d6fa5a025bfa328f069a
          submodules: recursive

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          config: |
            paths-ignore:
              - '**/*.test.js'
              - '**/*.spec.js'
              - '**/*.test.ts'
              - '**/*.spec.ts'
              - '**/*.test.tsx'
              - '**/*.spec.tsx'
              - 'scripts/**'

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{matrix.language}}"
