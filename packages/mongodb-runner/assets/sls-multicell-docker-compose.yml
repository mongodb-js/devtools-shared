    depends_on:
      init-cloud-resources:
        condition: service_completed_successfully
      backupmock:
        condition: service_started
    entrypoint: /bin/sh
    command:
      - -c
      - |
        /objectindexd --config /config.yml
    configs:
      - source: objectindexd_config
        target: /config.yml
      - source: ois_topology
        target: /config-sharding/ois_topology.yml
    environment:
      AWS_REGION: us-east-1
      AWS_ENDPOINT_URL: https://localhost.localstack.cloud:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    ports:
      - '${OBJECTINDEXD_PORT:-30022}:30003'
    extra_hosts:
      - 'local.sls.mmscloudteam.com:${HOST_INTERNAL_IP:-172.17.0.1}'

  objectreadproxyd:
    image: ${SLS_IMAGE_REPO}objectreadproxy:$SLS_IMAGE_TAG
    hostname: objectreadproxyd
    labels:
      testdata_id: ${TESTDATA_ID:-}
    command:
      - '--config'
      - '/config.yml'
    configs:
      - source: objectreadproxyd_config
        target: /config.yml
      - source: ois_topology
        target: /config-sharding/ois_topology.yml
    environment:
      AWS_REGION: us-east-1
      AWS_ENDPOINT_URL: https://localhost.localstack.cloud:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    depends_on:
      - objectindexd
    ports:
      - '${OBJECTREADPROXYD_PORT:-30023}:30006'
    extra_hosts:
      - 'local.sls.mmscloudteam.com:${HOST_INTERNAL_IP:-172.17.0.1}'

  infra.localstack:
    image: ${THIRD_PARTY_IMAGE_REPO}docker.io/localstack/localstack:4.7.0
    hostname: localhost.localstack.cloud
    labels:
      testdata_id: ${TESTDATA_ID:-}
    environment:
      SERVICES: s3,sqs
      LS_LOG: info
      DISABLE_EVENTS: 1
      LOCALSTACK_HOST: localhost.localstack.cloud

    healthcheck:
      test: ['CMD-SHELL', 'awslocal s3 ls && awslocal sqs list-queues']
      interval: 1s
      timeout: 30s
      start_period: 5s
      retries: 60

  init-cloud-resources:
    image: ${SLS_IMAGE_REPO}testdriver:$SLS_IMAGE_TAG
    labels:
      testdata_id: ${TESTDATA_ID:-}
    environment:
      AWS_ENDPOINT_URL: https://localhost.localstack.cloud:4566
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      S3_BUCKET_NAME: sls-testing-local
      SQS_POLICY_JSON_PATH: /scripts/object_services_aws_setup/sqs_policy.json
      create_sqs_queue: /scripts/object_services_aws_setup/create_sqs_queue.sh
      update_s3_notification_config: /scripts/object_services_aws_setup/update_s3_notification_config.sh
    depends_on:
      infra.localstack:
        condition: service_healthy
    command:
      - /bin/sh
      - -c
      - |
        set -e

        echo "creating storage bucket"
        # Create object storage bucket
        /testdriver object-storage create-bucket --name sls-testing-local --endpoint-url "https://localhost.localstack.cloud:4566" --region "us-east-1"

        echo "creating sqs queue"
        # Create SQS queue
        AWS_ACCOUNT_ID="000000000000"
        export SQS_QUEUE_ARN="arn:aws:sqs:$${AWS_REGION}:$${AWS_ACCOUNT_ID}:sls-testing-local"
        export S3_SOURCE_ARN="arn:aws:s3:::$${S3_BUCKET_NAME}"

        SQS_POLICY_JSON_CONTENT=$( cat "$${SQS_POLICY_JSON_PATH}" | envsubst | jq -c | jq -R )

        echo "Creating SQS queue with policy: $${SQS_POLICY_JSON_CONTENT}"
        "$${create_sqs_queue}" "$${S3_BUCKET_NAME}" "" "$${SQS_POLICY_JSON_CONTENT}"

        # Configure bucket event notification
        "$${update_s3_notification_config}" "$${S3_BUCKET_NAME}" "$${S3_BUCKET_NAME}" "$${SQS_QUEUE_ARN}" "dev/source_index/" ".sidx"

  testdriver:
    image: ${SLS_IMAGE_REPO}testdriver:$SLS_IMAGE_TAG
    labels:
      testdata_id: ${TESTDATA_ID:-}
    depends_on:
      init-cloud-resources:
        condition: service_completed_successfully
      crs-cell1-0:
        condition: service_started
      crs-cell2-0:
        condition: service_started
      crs-cell3-0:
        condition: service_started
      cms-cell1-0:
        condition: service_started
      cms-cell2-0:
        condition: service_started
      cms-cell3-0:
        condition: service_started
      logd-cell1-0:
        condition: service_started
      logd-cell2-0:
        condition: service_started
      logd-cell3-0:
        condition: service_started
      paged-cell1-0:
        condition: service_started
      paged-cell1-1:
        condition: service_started
      paged-cell1-2:
        condition: service_started
      paged-cell2-0:
        condition: service_started
      paged-cell2-1:
        condition: service_started
      paged-cell2-2:
        condition: service_started
      paged-cell3-0:
        condition: service_started
      paged-cell3-1:
        condition: service_started
      paged-cell3-2:
        condition: service_started
      pagematd-cell1-0:
        condition: service_started
      pagematd-cell2-0:
        condition: service_started
      pagematd-cell3-0:
        condition: service_started
      objectindexd:
        condition: service_started
      objectreadproxyd:
        condition: service_started
    environment:
      AWS_ENDPOINT_URL: https://localhost.localstack.cloud:4566
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    command:
      - /bin/sh
      - -c
      - |
        set -e

        # Wait for the CRSs to come up.
        /testdriver setup wait-until-serving \
          --servers http://crs-cell1-0:27996 \
          --servers http://crs-cell2-0:27996 \
          --servers http://crs-cell3-0:27996

        # Initialize the cells
        /grpcurl -plaintext -d '{}' crs-cell1-0:27996 schedulerservice.v1.CellAdminService/InitializeCell
        /grpcurl -plaintext -d '{}' crs-cell2-0:27996 schedulerservice.v1.CellAdminService/InitializeCell
        /grpcurl -plaintext -d '{}' crs-cell3-0:27996 schedulerservice.v1.CellAdminService/InitializeCell

        # Wait for log servers to come up.
        /testdriver setup wait-until-serving \
          --servers http://logd-cell1-0:27998 \
          --servers http://logd-cell2-0:27998 \
          --servers http://logd-cell3-0:27998

        # Wait for the CMSs to come up.
        /testdriver setup wait-until-serving \
          --servers http://cms-cell1-0:27995 \
          --servers http://cms-cell2-0:27995 \
          --servers http://cms-cell3-0:27995

        # Wait for the page servers to come up.
        /testdriver setup wait-until-serving \
          --servers http://paged-cell1-0:27999 \
          --servers http://paged-cell1-1:27999 \
          --servers http://paged-cell1-2:27999 \
          --servers http://paged-cell2-0:27999 \
          --servers http://paged-cell2-1:27999 \
          --servers http://paged-cell2-2:27999 \
          --servers http://paged-cell3-0:27999 \
          --servers http://paged-cell3-1:27999 \
          --servers http://paged-cell3-2:27999

        # Wait for the page materializers to come up.
        /testdriver setup wait-until-serving \
          --servers http://pagematd-cell1-0:30000 \
          --servers http://pagematd-cell2-0:30000 \
          --servers http://pagematd-cell3-0:30000

        # Wait for objectindex + objectreadproxy servers to come up.
        /testdriver setup wait-until-serving \
          --servers http://objectindexd:30003 \
          --servers http://objectreadproxyd:30006

        echo "SETUP COMPLETE!"
        touch /ready
        trap "echo Received SIGTERM; exit 0" SIGTERM
        while true; do sleep 1; done

configs:
  logd_config:
    content: |
      cell_config:
        cms_uris:
          - "$${CMS_URI_1}"
        cell:
          zone: "$${ZONE}"
          cell: "$${CELL}"
      raft_config:
        server_uri: "$${SERVER_URI}"
      log_storage_config:
        storage_dir: "logservice-data-$${INDEX}"
      server_config:
        logging:
          env_filter: "info,hyper=warn,h2=warn,reqwest=info,logservice::peer_msg_transport=warn"
        network:
          bind_ip: 0.0.0.0
          port: 27998

  paged_config:
    content: |
      store:
        path: "/mnt/paged"
        store_type: RocksDB

      server_config:
        logging:
          env_filter: "info,hyper=warn,h2=warn,reqwest=info"
          json: false

        network:
          bind_ip: 0.0.0.0
          port: 27999

      service:
        server_id:
          uri: $${URI}
          cell:
            zone: "$${ZONE}"
            cell: "$${CELL}"
        cell_metadata_service_uris:
          - "$${CMS_URI_1}"
        object_read_proxy_service_uri: http://objectreadproxyd:30006
        in_process_object_read_proxy:
          enabled: true
          object_storage_config:
            S3:
              region: us-east-1
              bucket: sls-testing-local
              prefix: dev
              role_arn: null
          ois_topology_description:
            File: "/config-sharding/ois_topology.yml"
          get_lsn_range_config:
            # 1.5 GiB — aggregate memory budget across all concurrent streams.
            total_memory_limit_bytes: 1610612736
            # 128 MiB — per-stream budget.
            stream_memory_limit_bytes: 134217728
            # 512 MiB — per-span size warning threshold.
            span_size_warning_threshold_bytes: 536870912
            # 24h — effectively unlimited; PS manages stream lifecycle.
            memory_reservation_timeout: 86400s
            lsn_range_batch_response_timeout: 86400s
            max_inflight_reads: 16
            location_channel_size: 256
            response_channel_size: 16

  pagematd_config:
    content: |
      server_config:
        network:
          bind_ip: 0.0.0.0
          port: 30000

      flag_config:
        state_path: "/flags-state.json"
        targeting:
          cell: "$${CELL}"
          environment: "local"
          pod: "$${POD}"

      storage_config:
        storage_dir: "/mnt/pagematd_storage"
        object_storage_provider_config:
          S3:
            region: us-east-1
            bucket: sls-testing-local
            prefix: dev
            role_arn: null

      metadata_config:
        cell_metadata_uris:
          - "$${CMS_URI_1}"
        pagematerializer_uri: http://$${HOSTNAME}:30000

      cell_metadata:
        cell: "$${CELL}"
        log_ids:
          "$${CELL}": 9999

  objectindexd_config:
    content: |
      server_config:
        network:
          bind_ip: 0.0.0.0
          port: 30003

        logging:
          env_filter: "info,hyper=warn,h2=warn,reqwest=info,rustls=warn,tower=warn"
          json: false
          file_name_prefix: "objectindexd.log"

        metrics:
          bind_ip: 0.0.0.0
          enable: false
          port: 9090

      service_config:
        object_storage_config:
          S3:
            region: us-east-1
            bucket: sls-testing-local
            prefix: dev
            role_arn: null
        created_event_queue_config:
          SQS:
            url_template: "https://sqs.us-east-1.localhost.localstack.cloud:4566/000000000000/sls-testing-local"
        deleted_event_queue_config:
          ListingQueue:
            offset: null
            rescan: true
        log_ancestry_config:
          SlsBackupService:
            uri: http://backupmock:4770
        storage_dir: "/mnt/objectindexd_storage/"
        sync_period: 5s
        sync_memory_threshold: 100000000
        num_index_consumers: 1
        server_id: objectindexd
        service_topology_description:
          File: "/config-sharding/ois_topology.yml"

  ois_topology:
    content: |
      servers:
        objectindexd: "http://objectindexd:30003"
      shards:
        "0":
          primary: objectindexd

  objectreadproxyd_config:
    content: |
      server_config:
        network:
          bind_ip: 0.0.0.0
          port: 30006

        logging:
          env_filter: "info,hyper=warn,h2=warn,reqwest=info,rustls=warn,tower=warn"
          json: false
          file_name_prefix: "objectreadproxyd.log"

        metrics:
          bind_ip: 0.0.0.0
          enable: false
          port: 9090

      service_config:
        object_storage_config:
          S3:
            region: us-east-1
            bucket: sls-testing-local
            prefix: dev
            role_arn: null

        storage_dir: objectreadproxyd_storage
        ois_topology_description:
          File: "/config-sharding/ois_topology.yml"

  cms_config:
    content: |
      snapshot_config:
        storage_dir: "/mnt/cms_storage/"
        local_snapshot_dir: "/tmp/cms"
        object_store_snapshot_prefix: "cms"
        object_storage_provider_config:
          S3:
            region: us-east-1
            bucket: sls-testing-local
            prefix: "dev-$${CELL}"
            role_arn: null
        target_snapshot_format_version: 2

      log_config:
        cell: "$${CELL}"
        log_ids:
          "$${CELL}": 9999
        log_segment_id: 0
        log_servers:
          - "$${LOG_SERVER_URI}"

      server_config:
        logging:
          env_filter: "info,hyper=warn,h2=warn,reqwest=info"
          json: false

        network:
          bind_ip: 0.0.0.0
          port: 27995

  crs_config:
    content: |
      server_config:
        metrics:
          enable: false
          port: 9090
          bind_ip: 0.0.0.0
        tracing:
          enable: false
          endpoint: "http://jaeger:4317"
          sample_rate: 1.0
        logging:
          env_filter: "info,hyper=warn,h2=warn,reqwest=info,scheduler::health_manager=warn,scheduler::health_policies=warn,scheduler::policies[check_health]=warn"
          json: false
          file_name_prefix: "scheduler.log"
        network:
          bind_ip: 0.0.0.0
          port: 27996

      flag_config:
        state_path: "/flags-state.json"
        targeting:
          cell: "$${CELL}"
          environment: "local"
          pod: "$${POD}"

      cell:
        cell:
          zone: "$${ZONE}"
          cell: "$${CELL}"
        resources:
          log_servers:
            - "$${LS_URI}"
          pm_servers:
            - "$${PM_URI}"
          page_servers:
            - "$${PS_URI_1}"
            - "$${PS_URI_2}"
            - "$${PS_URI_3}"
          cell_metadata_servers:
            - "$${CMS_URI_1}"
          object_read_proxy_servers:
            - "http://objectreadproxyd:30006"

      remote_cells:
        cells:
          - zone: zone1
            cell: cell1
          - zone: zone2
            cell: cell2
          - zone: zone3
            cell: cell3
        scheduler_servers:
          - "http://crs-cell1-0:27996"
          - "http://crs-cell2-0:27996"
          - "http://crs-cell3-0:27996"

      scrape:
        scrape_interval: 10s

      heat_management:
        log_server:
          configure_page_materializer:
            mode: enabled

      cell_metadata:
        cell: "$${CELL}"
        log_ids:
          "$${CELL}": 9999
        default_log_servers:
          - "$${LS_URI}"
        default_log_segment_id: 0

      object_storage:
        object_read_proxy_service_uri: "http://objectreadproxyd:30006"

  slsbackup_proto:
    file: ./slsbackup.proto
  flags_state:
    file: ./flags-state.json
